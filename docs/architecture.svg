<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="680" viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="1000" height="680" fill="#fafafa"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="20" font-weight="600" letter-spacing="-0.5" fill="#111">Voltaire — Architecture</text>
  <text x="500" y="56" text-anchor="middle" font-size="11" fill="#999">Cross-Chain European Options AMM on Uniswap V4</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ZONE: Cross-Chain Data Layer -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="80" width="940" height="130" rx="8" fill="none" stroke="#c8d8f0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="100" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#1e3a5f" text-transform="uppercase">CROSS-CHAIN DATA LAYER</text>

  <!-- Chain boxes -->
  <!-- Ethereum -->
  <rect x="50" y="108" width="160" height="86" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="50" y="108" width="160" height="20" rx="6" fill="#627eea" opacity="0.15"/>
  <text x="130" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#627eea">Ethereum</text>
  <text x="130" y="142" text-anchor="middle" font-size="9" fill="#555">ETH/USDC pool</text>
  <text x="130" y="156" text-anchor="middle" font-size="9" fill="#555">TWAP feed</text>
  <text x="130" y="170" text-anchor="middle" font-size="9" fill="#888">Weight: 35%</text>

  <!-- Arbitrum -->
  <rect x="230" y="108" width="160" height="86" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="230" y="108" width="160" height="20" rx="6" fill="#28a0f0" opacity="0.15"/>
  <text x="310" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#28a0f0">Arbitrum</text>
  <text x="310" y="142" text-anchor="middle" font-size="9" fill="#555">ETH/USDC pool</text>
  <text x="310" y="156" text-anchor="middle" font-size="9" fill="#555">TWAP feed</text>
  <text x="310" y="170" text-anchor="middle" font-size="9" fill="#888">Weight: 30%</text>

  <!-- Base -->
  <rect x="410" y="108" width="160" height="86" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="410" y="108" width="160" height="20" rx="6" fill="#0052ff" opacity="0.12"/>
  <text x="490" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#0052ff">Base</text>
  <text x="490" y="142" text-anchor="middle" font-size="9" fill="#555">ETH/USDC pool</text>
  <text x="490" y="156" text-anchor="middle" font-size="9" fill="#555">TWAP feed</text>
  <text x="490" y="170" text-anchor="middle" font-size="9" fill="#888">Weight: 20%</text>

  <!-- BSC -->
  <rect x="590" y="108" width="160" height="86" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="590" y="108" width="160" height="20" rx="6" fill="#f0b90b" opacity="0.18"/>
  <text x="670" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#b8860b">BSC</text>
  <text x="670" y="142" text-anchor="middle" font-size="9" fill="#555">ETH/USDC pool</text>
  <text x="670" y="156" text-anchor="middle" font-size="9" fill="#555">TWAP feed</text>
  <text x="670" y="170" text-anchor="middle" font-size="9" fill="#888">Weight: 15%</text>

  <!-- Arrows → Reactive -->
  <line x1="210" y1="151" x2="770" y2="151" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-blue)" opacity="0.5"/>
  <line x1="390" y1="151" x2="780" y2="151" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="570" y1="151" x2="785" y2="151" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="750" y1="151" x2="790" y2="151" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Reactive Network box -->
  <rect x="760" y="108" width="190" height="86" rx="6" fill="white" stroke="#6B21A8" stroke-width="1.5"/>
  <rect x="760" y="108" width="190" height="20" rx="6" fill="#6B21A8" opacity="0.12"/>
  <text x="855" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">Reactive Network</text>
  <text x="855" y="140" text-anchor="middle" font-size="9" fill="#555">Subscribes to 4 chains</text>
  <text x="855" y="154" text-anchor="middle" font-size="9" fill="#555">Computes realised vol</text>
  <text x="855" y="168" text-anchor="middle" font-size="9" fill="#555">Pushes index on-chain</text>
  <text x="855" y="182" text-anchor="middle" font-size="9" fill="#6B21A8">+ Cron for settlement</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ZONE: Unichain Protocol Layer -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="240" width="940" height="240" rx="8" fill="none" stroke="#c8c8c8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="260" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#555">UNICHAIN — PROTOCOL LAYER</text>

  <!-- VolatilityOracle -->
  <rect x="50" y="268" width="175" height="90" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="50" y="268" width="175" height="20" rx="6" fill="#111" opacity="0.06"/>
  <text x="137" y="282" text-anchor="middle" font-size="10" font-weight="600" fill="#111">VolatilityOracle.sol</text>
  <text x="137" y="300" text-anchor="middle" font-size="9" fill="#555">updateVolatility()</text>
  <text x="137" y="314" text-anchor="middle" font-size="9" fill="#555">getVolatility()</text>
  <text x="137" y="328" text-anchor="middle" font-size="9" fill="#555">48h ring-buffer history</text>
  <text x="137" y="342" text-anchor="middle" font-size="9" fill="#888">Authorized: Reactive relayer</text>

  <!-- BlackScholes -->
  <rect x="250" y="268" width="160" height="90" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="250" y="268" width="160" height="20" rx="6" fill="#111" opacity="0.06"/>
  <text x="330" y="282" text-anchor="middle" font-size="10" font-weight="600" fill="#111">BlackScholes.sol</text>
  <text x="330" y="300" text-anchor="middle" font-size="9" fill="#555">price(S, K, T, σ, isCall)</text>
  <text x="330" y="314" text-anchor="middle" font-size="9" fill="#555">WAD fixed-point math</text>
  <text x="330" y="328" text-anchor="middle" font-size="9" fill="#555">N(x) via A&amp;S approx</text>
  <text x="330" y="342" text-anchor="middle" font-size="9" fill="#888">Pure library (no storage)</text>

  <!-- OptionsHook — central, larger -->
  <rect x="430" y="260" width="200" height="110" rx="6" fill="white" stroke="#111" stroke-width="1.5"/>
  <rect x="430" y="260" width="200" height="22" rx="6" fill="#111"/>
  <text x="530" y="275" text-anchor="middle" font-size="11" font-weight="600" fill="white">OptionsHook.sol</text>
  <text x="530" y="295" text-anchor="middle" font-size="9" fill="#555">beforeSwap()</text>
  <text x="530" y="309" text-anchor="middle" font-size="9" fill="#555">beforeSwapReturnDelta()</text>
  <text x="530" y="323" text-anchor="middle" font-size="9" fill="#555">settleExpiredSeries()</text>
  <text x="530" y="337" text-anchor="middle" font-size="9" fill="#555">claimSettlement()</text>
  <text x="530" y="351" text-anchor="middle" font-size="9" fill="#888">Uniswap V4 Hook</text>

  <!-- OptionSeries -->
  <rect x="650" y="268" width="155" height="90" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="650" y="268" width="155" height="20" rx="6" fill="#111" opacity="0.06"/>
  <text x="727" y="282" text-anchor="middle" font-size="10" font-weight="600" fill="#111">OptionSeries.sol</text>
  <text x="727" y="300" text-anchor="middle" font-size="9" fill="#555">Series registry</text>
  <text x="727" y="314" text-anchor="middle" font-size="9" fill="#555">JIT mint / burn</text>
  <text x="727" y="328" text-anchor="middle" font-size="9" fill="#555">Strike × Expiry × CP</text>
  <text x="727" y="342" text-anchor="middle" font-size="9" fill="#888">→ mints OptionToken</text>

  <!-- CollateralVault -->
  <rect x="825" y="268" width="135" height="90" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="825" y="268" width="135" height="20" rx="6" fill="#111" opacity="0.06"/>
  <text x="892" y="282" text-anchor="middle" font-size="10" font-weight="600" fill="#111">CollateralVault.sol</text>
  <text x="892" y="300" text-anchor="middle" font-size="9" fill="#555">LP deposits USDC</text>
  <text x="892" y="314" text-anchor="middle" font-size="9" fill="#555">Premium accrual</text>
  <text x="892" y="328" text-anchor="middle" font-size="9" fill="#555">Utilization lock</text>
  <text x="892" y="342" text-anchor="middle" font-size="9" fill="#888">paySettlement()</text>

  <!-- Uniswap V4 PoolManager -->
  <rect x="240" y="390" width="190" height="70" rx="6" fill="#ff007a" opacity="0.07" stroke="#ff007a" stroke-width="1"/>
  <text x="335" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#cc005e">Uniswap V4</text>
  <text x="335" y="428" text-anchor="middle" font-size="9" fill="#555">PoolManager</text>
  <text x="335" y="444" text-anchor="middle" font-size="9" fill="#888">ETH/USDC pool</text>

  <!-- OptionToken -->
  <rect x="450" y="390" width="160" height="70" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="450" y="390" width="160" height="20" rx="6" fill="#111" opacity="0.06"/>
  <text x="530" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#111">OptionToken.sol</text>
  <text x="530" y="422" text-anchor="middle" font-size="9" fill="#555">ERC20 per series</text>
  <text x="530" y="436" text-anchor="middle" font-size="9" fill="#555">e.g. ETH-3400-MAR26-C</text>
  <text x="530" y="450" text-anchor="middle" font-size="9" fill="#888">Minted JIT on purchase</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ZONE: User Layer -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="30" y="510" width="940" height="130" rx="8" fill="none" stroke="#d0e8d0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="50" y="530" font-size="9" font-weight="600" letter-spacing="0.08em" fill="#1a7a3f">USER LAYER</text>

  <!-- Trader -->
  <rect x="100" y="538" width="160" height="88" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="180" y="558" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Trader</text>
  <text x="180" y="575" text-anchor="middle" font-size="9" fill="#555">Calls swap() with hookData</text>
  <text x="180" y="589" text-anchor="middle" font-size="9" fill="#555">(strike, expiry, qty)</text>
  <text x="180" y="603" text-anchor="middle" font-size="9" fill="#555">Receives OptionToken ERC20</text>
  <text x="180" y="617" text-anchor="middle" font-size="9" fill="#888">Claims payout at expiry</text>

  <!-- LP/Writer -->
  <rect x="400" y="538" width="200" height="88" rx="6" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="500" y="558" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Liquidity Provider</text>
  <text x="500" y="575" text-anchor="middle" font-size="9" fill="#555">Deposits USDC as collateral</text>
  <text x="500" y="589" text-anchor="middle" font-size="9" fill="#555">Earns premiums from sales</text>
  <text x="500" y="603" text-anchor="middle" font-size="9" fill="#555">Share-based vault (NAV/share)</text>
  <text x="500" y="617" text-anchor="middle" font-size="9" fill="#1a7a3f">Est. 17.3% APY</text>

  <!-- Reactive Cron -->
  <rect x="740" y="538" width="200" height="88" rx="6" fill="white" stroke="#6B21A8" stroke-width="1"/>
  <text x="840" y="558" text-anchor="middle" font-size="11" font-weight="500" fill="#6B21A8">Reactive Cron</text>
  <text x="840" y="575" text-anchor="middle" font-size="9" fill="#555">Scheduled at each expiry</text>
  <text x="840" y="589" text-anchor="middle" font-size="9" fill="#555">Calls settleExpiredSeries()</text>
  <text x="840" y="603" text-anchor="middle" font-size="9" fill="#555">With cross-chain TWAP spot</text>
  <text x="840" y="617" text-anchor="middle" font-size="9" fill="#888">No manual keepers needed</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- Reactive → VolatilityOracle -->
  <line x1="855" y1="194" x2="200" y2="262" stroke="#6B21A8" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="560" y="240" text-anchor="middle" font-size="9" fill="#6B21A8">updateVolatility(σ, chainsMask)</text>

  <!-- VolOracle → Hook -->
  <line x1="225" y1="313" x2="430" y2="313" stroke="#555" stroke-width="1" marker-end="url(#arr-grey)"/>
  <text x="325" y="307" text-anchor="middle" font-size="8" fill="#888">getVolatility()</text>

  <!-- BlackScholes → Hook -->
  <line x1="410" y1="313" x2="432" y2="313" stroke="#555" stroke-width="1" marker-end="url(#arr-grey)"/>
  <text x="418" y="308" text-anchor="middle" font-size="8" fill="#888">price()</text>

  <!-- Hook → OptionSeries -->
  <line x1="630" y1="313" x2="650" y2="313" stroke="#555" stroke-width="1" marker-end="url(#arr-grey)"/>

  <!-- Hook → CollateralVault -->
  <line x1="630" y1="330" x2="825" y2="330" stroke="#555" stroke-width="1" marker-end="url(#arr-grey)"/>
  <text x="726" y="325" text-anchor="middle" font-size="8" fill="#888">lockCollateral / paySettlement</text>

  <!-- Hook ↔ PoolManager -->
  <line x1="500" y1="370" x2="400" y2="390" stroke="#ff007a" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-pink)"/>

  <!-- OptionSeries → OptionToken -->
  <line x1="700" y1="358" x2="580" y2="390" stroke="#555" stroke-width="1" marker-end="url(#arr-grey)"/>
  <text x="658" y="378" text-anchor="middle" font-size="8" fill="#888">mint()</text>

  <!-- Trader → PoolManager -->
  <line x1="220" y1="538" x2="310" y2="460" stroke="#111" stroke-width="1" marker-end="url(#arr-dark)"/>
  <text x="240" y="500" text-anchor="middle" font-size="8" fill="#555">swap(hookData)</text>

  <!-- LP → CollateralVault -->
  <line x1="590" y1="538" x2="870" y2="360" stroke="#1a7a3f" stroke-width="1" marker-end="url(#arr-green)"/>
  <text x="750" y="450" text-anchor="middle" font-size="8" fill="#1a7a3f">deposit()</text>

  <!-- Reactive Cron → Hook -->
  <line x1="840" y1="538" x2="600" y2="380" stroke="#6B21A8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-purple)"/>
  <text x="740" y="470" text-anchor="middle" font-size="8" fill="#6B21A8">settleExpiredSeries()</text>

  <!-- MEV tax note -->
  <rect x="30" y="650" width="940" height="22" rx="4" fill="#fff8e6"/>
  <text x="500" y="665" text-anchor="middle" font-size="10" fill="#b45309">
    Deployed on Unichain · MEV tax captures options arbitrage value → improves protocol sustainability and capital efficiency
  </text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1e3a5f"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6B21A8"/>
    </marker>
    <marker id="arr-grey" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arr-dark" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#111"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a7a3f"/>
    </marker>
    <marker id="arr-pink" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff007a"/>
    </marker>
  </defs>

</svg>
