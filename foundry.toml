[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@uniswap/v4-core/=lib/v4-core/",
  "@uniswap/v4-periphery/=lib/v4-periphery/",
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@uniswap/v4-core/=lib/v4-core/",
  "@uniswap/v4-periphery/=lib/v4-periphery/",
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[rpc_endpoints]
unichain_sepolia = "https://sepolia.unichain.org"
lasna            = "https://lasna-rpc.rnk.dev/"

[fmt]
line_length = 100
tab_width = 4

[profile.sepolia]
src = "src"
out = "out"
libs = ["lib"]
